<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>水泥杯叫貨估算系統</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9E%95%3C/text%3E%3C/svg%3E">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          cream: '#FBFBFA',
          ink: '#2B2B29',
        },
        fontFamily: {
          sans: ['"Noto Sans TC"', 'sans-serif'],
        }
      }
    }
  }
</script>
<style>
  * { -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Noto Sans TC', sans-serif; background:#FBFBFA; color:#2B2B29; }
  .tracking-wider2 { letter-spacing: 0.12em; }
  .tracking-wider3 { letter-spacing: 0.18em; }
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }
  ::-webkit-scrollbar { width: 4px; height:4px; }
  ::-webkit-scrollbar-thumb { background:#E7E5E1; border-radius:4px; }
  .fade-in { animation: fadeIn .25s ease; }
  @keyframes fadeIn { from{opacity:0; transform:translateY(2px);} to{opacity:1; transform:translateY(0);} }
  select { background-image: none; }
</style>
</head>
<body class="min-h-screen pb-16">

<div class="max-w-md md:max-w-6xl mx-auto px-5 pt-10">

  <!-- 頁首 -->
  <header class="mb-10 text-center">
    <h1 class="text-xl font-light tracking-wider2 text-ink">水泥杯叫貨估算系統</h1>
    <div class="w-8 h-px bg-stone-300 mx-auto mt-4"></div>
  </header>

  <!-- 雙欄容器（電腦版）／單欄（手機版） -->
  <div class="md:grid md:grid-cols-2 md:gap-8 md:items-start">

    <!-- 左欄：選品區 + 費用估算 -->
    <div class="md:flex md:flex-col">

      <!-- 選品區 -->
      <section class="bg-white border border-stone-100 rounded-2xl p-5 mb-6 fade-in">
        <h2 class="text-xs tracking-wider3 text-stone-400 font-light mb-4">選擇品項</h2>

        <!-- 色系 -->
        <div class="mb-5">
          <p class="text-[11px] tracking-wider2 text-stone-400 font-light mb-2">色系</p>
          <div id="categoryButtons" class="grid grid-cols-3 gap-2"></div>
        </div>

        <!-- 顏色 -->
        <div class="mb-5">
          <p class="text-[11px] tracking-wider2 text-stone-400 font-light mb-2">顏色</p>
          <div class="relative">
            <select id="colorSelect" class="w-full appearance-none border border-stone-200 rounded-xl py-3 px-4 text-sm font-light tracking-wide text-ink focus:outline-none focus:border-stone-400 bg-white"></select>
            <div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-stone-300 text-xs">▾</div>
          </div>
        </div>

        <!-- 尺寸 -->
        <div class="mb-5" id="sizeWrap">
          <p class="text-[11px] tracking-wider2 text-stone-400 font-light mb-2">尺寸</p>
          <div id="sizeButtons" class="grid grid-cols-2 gap-2"></div>
        </div>

        <!-- 工藝 -->
        <div class="mb-5" id="craftWrap">
          <p class="text-[11px] tracking-wider2 text-stone-400 font-light mb-2">工藝</p>
          <div id="craftButtons" class="grid grid-cols-3 gap-2"></div>
        </div>

        <!-- 數量 -->
        <div class="mb-5">
          <p class="text-[11px] tracking-wider2 text-stone-400 font-light mb-2">數量</p>
          <div class="flex items-center gap-3">
            <button id="qtyMinus" class="w-11 h-11 flex items-center justify-center rounded-xl border border-stone-200 text-stone-500 text-lg font-light active:bg-stone-100 transition">－</button>
            <input id="qtyInput" type="number" value="1" min="1" class="flex-1 text-center border border-stone-200 rounded-xl py-3 text-sm font-light focus:outline-none focus:border-stone-400">
            <button id="qtyPlus" class="w-11 h-11 flex items-center justify-center rounded-xl border border-stone-200 text-stone-500 text-lg font-light active:bg-stone-100 transition">＋</button>
          </div>
        </div>

        <!-- 單價顯示 -->
        <div class="flex items-center justify-between mb-4 px-1">
          <span class="text-[11px] tracking-wider2 text-stone-400 font-light">單價</span>
          <span id="unitPriceDisplay" class="text-sm font-light text-ink tracking-wide">$0 / 個</span>
        </div>

        <button id="addBtn" class="w-full py-3.5 rounded-xl bg-ink text-white text-sm font-light tracking-wider2 active:opacity-80 transition">加入暫存清單</button>
      </section>

      <!-- 費用估算 -->
      <section id="summarySection" class="bg-white border border-stone-100 rounded-2xl p-5 mb-6 hidden fade-in">
        <h2 class="text-xs tracking-wider3 text-stone-400 font-light mb-4">費用估算</h2>
        <div class="space-y-2 text-sm font-light">
          <div class="flex justify-between text-stone-600">
            <span class="tracking-wide">商品小計</span>
            <span id="productTotal" class="tracking-wide">$0</span>
          </div>
          <div class="flex justify-between text-stone-400 text-xs">
            <span class="tracking-wide" id="boxBreakdown">箱數明細</span>
          </div>
          <div class="flex justify-between text-stone-600">
            <span class="tracking-wide">運費</span>
            <span id="shippingTotal" class="tracking-wide">$0</span>
          </div>
          <div class="flex justify-between text-stone-600">
            <span class="tracking-wide">稅金（5%）</span>
            <span id="taxTotal" class="tracking-wide">$0</span>
          </div>
          <div class="w-full h-px bg-stone-100 my-2"></div>
          <div class="flex justify-between text-base">
            <span class="tracking-wider2 text-ink">總計</span>
            <span id="grandTotal" class="tracking-wide text-ink font-normal">$0</span>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-2 mt-5">
          <button id="copyBtn" class="py-3 rounded-xl border border-stone-200 text-ink text-xs font-light tracking-wider2 active:bg-stone-50 transition">一鍵複製叫貨明細</button>
          <button id="confirmBtn" class="py-3 rounded-xl bg-ink text-white text-xs font-light tracking-wider2 active:opacity-80 transition">確認叫貨</button>
        </div>
        <button id="confirmCopyBtn" class="w-full py-3 rounded-xl border border-stone-300 text-ink text-xs font-light tracking-wider2 active:bg-stone-50 transition mt-2">確認叫貨＋複製 TSV（Google Sheet）</button>
        <p id="copyToast" class="text-center text-[11px] text-stone-400 font-light mt-3 opacity-0 transition-opacity">已複製到剪貼簿</p>
      </section>

    </div>

    <!-- 右欄：暫存清單 + 歷史紀錄 -->
    <div class="md:flex md:flex-col">

      <!-- 暫存清單 -->
      <section class="mb-6">
        <h2 class="text-xs tracking-wider3 text-stone-400 font-light mb-3 px-1">暫存叫貨清單</h2>
        <div id="cartList" class="space-y-2 mb-3"></div>
        <p id="emptyCart" class="text-center text-xs text-stone-300 font-light py-8 border border-dashed border-stone-200 rounded-2xl">尚未加入任何品項</p>
      </section>

      <!-- 歷史紀錄 -->
      <section>
        <h2 class="text-xs tracking-wider3 text-stone-400 font-light mb-3 px-1">歷史叫貨紀錄</h2>
        <div id="historyList" class="space-y-3"></div>
        <p id="emptyHistory" class="text-center text-xs text-stone-300 font-light py-8 border border-dashed border-stone-200 rounded-2xl">尚無歷史紀錄</p>
      </section>

    </div>

  </div>

</div>

<script>
/* ---------------- 資料模型 ---------------- */
const CATEGORIES = {
  base: {
    name: '基礎色系',
    colors: ['白','粉','黃','米','亮粉','灰','灰粉'],
    sizes: { 大: { 純色:94, 磨砂:110, 磨石:126 }, 小: { 純色:74, 磨砂:84, 磨石:94 } },
    special: false
  },
  mid: {
    name: '中階色系',
    colors: ['寶寶藍','藍綠','鐵黑'],
    sizes: { 大: { 純色:100, 磨砂:116, 磨石:131 }, 小: { 純色:79, 磨砂:89, 磨石:100 } },
    special: false
  },
  advanced: {
    name: '進階色系',
    colors: ['聖誕橘','酪梨綠','灰藍','土黃','奶茶','灰綠','灰橘'],
    sizes: { 大: { 純色:105, 磨砂:121, 磨石:136 }, 小: { 純色:84, 磨砂:94, 磨石:105 } },
    special: false
  },
  catear: {
    name: '貓耳杯',
    colors: ['白','黃','聖誕橘'],
    sizes: { 小: { 純色:110 } },
    special: true
  },
  bearear: {
    name: '熊耳杯',
    colors: ['白','黃','聖誕橘'],
    sizes: { 小: { 純色:110 } },
    special: true
  }
};
const CATEGORY_KEYS = Object.keys(CATEGORIES);
const BOX_CAPACITY = { S: 38, L: 30, special: 25 };
const BOX_FEE = 200;
const TAX_RATE = 0.05;

/* ---------------- 狀態（不再使用 localStorage，重新整理即清空） ---------------- */
let state = {
  category: 'base',
  color: CATEGORIES.base.colors[0],
  size: '大',
  craft: '純色',
  qty: 1
};
let cart = [];
let history = [];
let cartIdCounter = 0;
let historyIdCounter = 0;

/* ---------------- 選品 UI 渲染 ---------------- */
const categoryButtons = document.getElementById('categoryButtons');
const colorSelect = document.getElementById('colorSelect');
const sizeButtons = document.getElementById('sizeButtons');
const craftButtons = document.getElementById('craftButtons');
const sizeWrap = document.getElementById('sizeWrap');
const craftWrap = document.getElementById('craftWrap');
const qtyInput = document.getElementById('qtyInput');
const unitPriceDisplay = document.getElementById('unitPriceDisplay');

function renderCategoryButtons() {
  categoryButtons.innerHTML = '';
  CATEGORY_KEYS.forEach(key => {
    const btn = document.createElement('button');
    const active = state.category === key;
    btn.textContent = CATEGORIES[key].name;
    btn.className = `py-2.5 rounded-xl text-xs font-light tracking-wide border transition ${
      active ? 'bg-ink text-white border-ink' : 'border-stone-200 text-stone-500 active:bg-stone-50'
    }`;
    btn.onclick = () => {
      state.category = key;
      const cat = CATEGORIES[key];
      state.color = cat.colors[0];
      state.size = Object.keys(cat.sizes)[0];
      state.craft = Object.keys(cat.sizes[state.size])[0];
      renderAll();
    };
    categoryButtons.appendChild(btn);
  });
}

function renderColorSelect() {
  const cat = CATEGORIES[state.category];
  colorSelect.innerHTML = '';
  cat.colors.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    if (c === state.color) opt.selected = true;
    colorSelect.appendChild(opt);
  });
}

function renderSizeButtons() {
  const cat = CATEGORIES[state.category];
  const sizes = Object.keys(cat.sizes);
  if (sizes.length <= 1) {
    sizeWrap.classList.add('hidden');
  } else {
    sizeWrap.classList.remove('hidden');
  }
  sizeButtons.innerHTML = '';
  sizes.forEach(s => {
    const btn = document.createElement('button');
    const active = state.size === s;
    btn.textContent = s === '大' ? '大顆' : '小顆';
    btn.className = `py-2.5 rounded-xl text-xs font-light tracking-wide border transition ${
      active ? 'bg-ink text-white border-ink' : 'border-stone-200 text-stone-500 active:bg-stone-50'
    }`;
    btn.onclick = () => {
      state.size = s;
      state.craft = Object.keys(cat.sizes[s])[0];
      renderAll();
    };
    sizeButtons.appendChild(btn);
  });
}

function renderCraftButtons() {
  const cat = CATEGORIES[state.category];
  const crafts = Object.keys(cat.sizes[state.size]);
  if (crafts.length <= 1) {
    craftWrap.classList.add('hidden');
  } else {
    craftWrap.classList.remove('hidden');
  }
  craftButtons.innerHTML = '';
  crafts.forEach(c => {
    const btn = document.createElement('button');
    const active = state.craft === c;
    btn.textContent = c;
    btn.className = `py-2.5 rounded-xl text-xs font-light tracking-wide border transition ${
      active ? 'bg-ink text-white border-ink' : 'border-stone-200 text-stone-500 active:bg-stone-50'
    }`;
    btn.onclick = () => {
      state.craft = c;
      renderAll();
    };
    craftButtons.appendChild(btn);
  });
}

function getUnitPrice() {
  const cat = CATEGORIES[state.category];
  return cat.sizes[state.size][state.craft] || 0;
}

function renderUnitPrice() {
  unitPriceDisplay.textContent = `$${getUnitPrice()} / 個`;
}

function renderAll() {
  renderCategoryButtons();
  renderColorSelect();
  renderSizeButtons();
  renderCraftButtons();
  renderUnitPrice();
}

colorSelect.addEventListener('change', e => {
  state.color = e.target.value;
});

document.getElementById('qtyMinus').onclick = () => {
  qtyInput.value = Math.max(1, (parseInt(qtyInput.value) || 1) - 1);
};
document.getElementById('qtyPlus').onclick = () => {
  qtyInput.value = (parseInt(qtyInput.value) || 1) + 1;
};

/* ---------------- 加入暫存 ---------------- */
document.getElementById('addBtn').onclick = () => {
  const qty = Math.max(1, parseInt(qtyInput.value) || 1);
  const cat = CATEGORIES[state.category];
  const boxType = cat.special ? 'special' : (state.size === '大' ? 'L' : 'S');
  const unitPrice = getUnitPrice();
  cartIdCounter += 1;
  cart.push({
    id: cartIdCounter,
    categoryKey: state.category,
    categoryName: cat.name,
    special: cat.special,
    color: state.color,
    size: state.size,
    craft: state.craft,
    qty,
    unitPrice,
    boxType
  });
  qtyInput.value = 1;
  renderCart();
};

/* ---------------- 暫存清單渲染 ---------------- */
const cartList = document.getElementById('cartList');
const emptyCart = document.getElementById('emptyCart');
const summarySection = document.getElementById('summarySection');

function itemLabel(item) {
  if (item.special) {
    return `${item.categoryName}-${item.color}-${item.size === '大' ? '大' : '小'}-${item.craft}`;
  }
  return `${item.color}-${item.size}-${item.craft}`;
}

function calcBoxesAndShipping(items) {
  const totals = { S: 0, L: 0, special: 0 };
  items.forEach(it => { totals[it.boxType] += it.qty; });
  const boxesS = Math.ceil(totals.S / BOX_CAPACITY.S);
  const boxesL = Math.ceil(totals.L / BOX_CAPACITY.L);
  const boxesSpecial = Math.ceil(totals.special / BOX_CAPACITY.special);
  const totalBoxes = boxesS + boxesL + boxesSpecial;
  const shipping = totalBoxes * BOX_FEE;
  return { totals, boxesS, boxesL, boxesSpecial, totalBoxes, shipping };
}

function renderCart() {
  cartList.innerHTML = '';
  if (cart.length === 0) {
    emptyCart.classList.remove('hidden');
    summarySection.classList.add('hidden');
    return;
  }
  emptyCart.classList.add('hidden');
  summarySection.classList.remove('hidden');

  cart.forEach(item => {
    const row = document.createElement('div');
    row.className = 'bg-white border border-stone-100 rounded-xl px-4 py-3 flex items-center justify-between fade-in';
    row.innerHTML = `
      <div>
        <p class="text-sm font-light tracking-wide text-ink">${itemLabel(item)}</p>
        <p class="text-[11px] text-stone-400 font-light mt-0.5">$${item.unitPrice} × ${item.qty} = $${item.unitPrice * item.qty}</p>
      </div>
      <button data-id="${item.id}" class="removeItemBtn w-9 h-9 flex items-center justify-center text-stone-300 hover:text-stone-500 text-sm">✕</button>
    `;
    cartList.appendChild(row);
  });

  document.querySelectorAll('.removeItemBtn').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.id);
      cart = cart.filter(i => i.id !== id);
      renderCart();
    };
  });

  renderSummary();
}

function getCostBreakdown() {
  const productTotal = cart.reduce((sum, i) => sum + i.unitPrice * i.qty, 0);
  const { boxesS, boxesL, boxesSpecial, totalBoxes, shipping } = calcBoxesAndShipping(cart);
  const tax = Math.round((productTotal + shipping) * TAX_RATE);
  const grandTotal = productTotal + shipping + tax;
  return { productTotal, boxesS, boxesL, boxesSpecial, totalBoxes, shipping, tax, grandTotal };
}

function renderSummary() {
  const { productTotal, boxesS, boxesL, boxesSpecial, totalBoxes, shipping, tax, grandTotal } = getCostBreakdown();
  document.getElementById('productTotal').textContent = `$${productTotal}`;
  document.getElementById('boxBreakdown').textContent =
    `小箱 ${boxesS}・大箱 ${boxesL}・特殊箱 ${boxesSpecial}（共 ${totalBoxes} 箱）`;
  document.getElementById('shippingTotal').textContent = `$${shipping}`;
  document.getElementById('taxTotal').textContent = `$${tax}`;
  document.getElementById('grandTotal').textContent = `$${grandTotal}`;
}

/* ---------------- 一鍵複製叫貨明細（簡易文字版） ---------------- */
document.getElementById('copyBtn').onclick = () => {
  const now = new Date();
  const dateStr = `${now.getMonth() + 1}/${now.getDate()}`;
  let text = `【 ${dateStr} 叫貨 】\n`;
  cart.forEach(item => {
    text += `${itemLabel(item)} *${item.qty}\n`;
  });
  text = text.trim();
  copyToClipboard(text);
};

function copyToClipboard(text) {
  navigator.clipboard.writeText(text).then(() => {
    showToast();
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast();
  });
}

function showToast() {
  const toast = document.getElementById('copyToast');
  toast.classList.remove('opacity-0');
  setTimeout(() => toast.classList.add('opacity-0'), 1600);
}

/* ---------------- 確認叫貨（共用邏輯：寫入歷史紀錄，並可選擇是否自動複製 Google Sheet TSV 格式） ---------------- */
function buildTsvText(dateStr, items, shipping, tax, grandTotal) {
  const rows = [];
  rows.push(['日期', '款式', '數量', '單價', '總金額'].join('\t'));
  items.forEach((item, idx) => {
    const dateCell = idx === 0 ? dateStr : '';
    const subtotal = item.unitPrice * item.qty;
    rows.push([dateCell, itemLabel(item), item.qty, item.unitPrice, subtotal].join('\t'));
  });
  rows.push(['', '運費', 1, shipping, shipping].join('\t'));
  rows.push(['', '稅金', '', '', tax].join('\t'));
  rows.push(['', '總金額', '', '', grandTotal].join('\t'));
  return rows.join('\n');
}

function confirmOrder(shouldCopyTsv) {
  if (cart.length === 0) return;
  const now = new Date();
  const dateStr = `${now.getFullYear()}/${String(now.getMonth() + 1).padStart(2, '0')}/${String(now.getDate()).padStart(2, '0')}`;
  const { productTotal, shipping, tax, grandTotal } = getCostBreakdown();

  // 寫入歷史紀錄
  historyIdCounter += 1;
  history.unshift({
    id: historyIdCounter,
    date: dateStr,
    timestamp: now.getTime(),
    items: cart.map(i => ({ label: itemLabel(i), qty: i.qty })),
    productTotal,
    shipping,
    tax,
    grandTotal,
    actualCost: null
  });

  if (shouldCopyTsv) {
    const tsvText = buildTsvText(dateStr, cart, shipping, tax, grandTotal);
    copyToClipboard(tsvText);
  }

  cart = [];
  renderCart();
  renderHistory();
}

document.getElementById('confirmBtn').onclick = () => confirmOrder(false);
document.getElementById('confirmCopyBtn').onclick = () => confirmOrder(true);

/* ---------------- 歷史紀錄渲染 ---------------- */
const historyList = document.getElementById('historyList');
const emptyHistory = document.getElementById('emptyHistory');

function renderHistory() {
  historyList.innerHTML = '';
  if (history.length === 0) {
    emptyHistory.classList.remove('hidden');
    return;
  }
  emptyHistory.classList.add('hidden');

  history.forEach(record => {
    const card = document.createElement('div');
    card.className = 'bg-white border border-stone-100 rounded-2xl p-5 fade-in';

    const itemsHtml = record.items.map(i =>
      `<p class="text-xs font-light text-stone-500 tracking-wide">${i.label} <span class="text-stone-300">×${i.qty}</span></p>`
    ).join('');

    const hasActual = record.actualCost !== null && record.actualCost !== undefined && record.actualCost !== '';
    let diffHtml = '';
    if (hasActual) {
      const diff = Number(record.actualCost) - record.grandTotal;
      const sign = diff > 0 ? '+' : diff < 0 ? '' : '±';
      const colorClass = diff === 0 ? 'text-stone-400' : (diff > 0 ? 'text-stone-500' : 'text-stone-500');
      diffHtml = `<p class="text-[11px] font-light ${colorClass} mt-2 tracking-wide">與系統估算差額：${sign}${diff} 元</p>`;
    }

    card.innerHTML = `
      <div class="flex items-start justify-between mb-3">
        <p class="text-sm font-normal tracking-wider2 text-ink">${record.date} 叫貨</p>
        <button data-id="${record.id}" class="deleteHistoryBtn text-stone-300 hover:text-stone-500 text-sm w-8 h-8 flex items-center justify-center">✕</button>
      </div>
      <div class="space-y-0.5 mb-4">${itemsHtml}</div>
      <div class="w-full h-px bg-stone-100 mb-3"></div>
      <div class="flex items-center justify-between mb-1">
        <span class="text-[11px] tracking-wide text-stone-400 font-light">商品小計</span>
        <span class="text-sm font-light text-ink tracking-wide">$${record.productTotal}</span>
      </div>
      <div class="flex items-center justify-between mb-1">
        <span class="text-[11px] tracking-wide text-stone-400 font-light">運費</span>
        <span class="text-sm font-light text-ink tracking-wide">$${record.shipping}</span>
      </div>
      <div class="flex items-center justify-between mb-1">
        <span class="text-[11px] tracking-wide text-stone-400 font-light">稅金（5%）</span>
        <span class="text-sm font-light text-ink tracking-wide">$${record.tax}</span>
      </div>
      <div class="flex items-center justify-between mb-1">
        <span class="text-[11px] tracking-wide text-stone-400 font-light">系統估算總計</span>
        <span class="text-sm font-light text-ink tracking-wide">$${record.grandTotal}</span>
      </div>
      <div class="flex items-center justify-between mt-3">
        <span class="text-[11px] tracking-wide text-stone-400 font-light">廠商實際請款</span>
        <input type="number" placeholder="輸入金額" data-id="${record.id}"
          class="actualCostInput w-28 text-right border border-stone-200 rounded-lg py-1.5 px-2 text-sm font-light tracking-wide focus:outline-none focus:border-stone-400"
          value="${record.actualCost !== null && record.actualCost !== undefined ? record.actualCost : ''}">
      </div>
      ${diffHtml}
    `;
    historyList.appendChild(card);
  });

  document.querySelectorAll('.deleteHistoryBtn').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.id);
      history = history.filter(r => r.id !== id);
      renderHistory();
    };
  });

  document.querySelectorAll('.actualCostInput').forEach(input => {
    input.addEventListener('input', () => {
      const id = parseInt(input.dataset.id);
      const record = history.find(r => r.id === id);
      if (!record) return;
      record.actualCost = input.value === '' ? null : Number(input.value);
    });
    input.addEventListener('blur', () => {
      renderHistory();
    });
  });
}

/* ---------------- 初始化 ---------------- */
renderAll();
renderCart();
renderHistory();
</script>

</body>
</html>
